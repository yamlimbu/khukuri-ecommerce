name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          DEV_PRIVATE_KEY: ${{ secrets.DEV_PRIVATE_KEY }}
          DEV_USER: ${{ secrets.DEV_USER }}
          DEV_HOSTNAME: ${{ secrets.DEV_HOSTNAME }}
        run: |
          # Start ssh-agent
          eval $(ssh-agent -s)
          
          # Add private key from GitHub secrets
          echo "$DEV_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          
          # Run deployment commands on the remote server
          ssh -o StrictHostKeyChecking=no $DEV_USER@$DEV_HOSTNAME bash -s << 'EOF'
            cd htdocs/himalayankhukuri.com/khukuri-ecommerce
            git pull origin main
            
            # Install dependencies
            npm install
            
            # Build backend
            cd apps/server
            npm run build
            cd ../..
            
            # Restart backend with cleanup
            npx pm2 delete vendure-backend || true
            npx pm2 start apps/server/dist/index.js --name vendure-backend --cwd apps/server
            
            # Build storefront with local API
            cd apps/storefront
            VENDURE_SHOP_API_URL=http://127.0.0.1:3002/shop-api npm run build
            cd ../..
            
            # Restart storefront
            npx pm2 restart khukuri-storefront
            
            # Save PM2 state
            npx pm2 save
            
            echo 'Deployment completed successfully!'
          EOF