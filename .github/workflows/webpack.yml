name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          DEV_PRIVATE_KEY: ${{ secrets.DEV_PRIVATE_KEY }}
          DEV_USER: ${{ secrets.DEV_USER }}
          DEV_HOSTNAME: ${{ secrets.DEV_HOSTNAME }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
        run: |
          eval $(ssh-agent -s)
          echo "$DEV_PRIVATE_KEY" | tr -d '\r' | ssh-add -

          # -l = login shell so .bash_profile / .profile is sourced (loads nvm/node/npm)
          ssh -o StrictHostKeyChecking=no $DEV_USER@$DEV_HOSTNAME \
            REVALIDATION_SECRET="$REVALIDATION_SECRET" \
            bash -l -s << 'ENDSSH'
            set -e   # abort on any error

            # ── Bootstrap nvm + Node 20 LTS ───────────────────────────────────
            export NVM_DIR="$HOME/.nvm"

            # Install nvm if not present (first-time server setup)
            if [ ! -s "$NVM_DIR/nvm.sh" ]; then
              echo "==> nvm not found — installing nvm v0.40.3..."
              curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            fi

            source "$NVM_DIR/nvm.sh"

            # Install and activate Node 20 LTS
            nvm install 20
            nvm use 20
            nvm alias default 20

            echo "==> Node: $(node -v)  npm: $(npm -v)"

            APP_DIR="htdocs/himalayankhukuri.com/khukuri-ecommerce"
            cd "$APP_DIR"

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Normalizing patch file line endings (CRLF→LF for patch-package)..."
            find patches -name "*.patch" -exec sed -i 's/\r//' {} \;

            echo "==> Installing dependencies (Node $(node -v))..."
            npm install

            # ── BACKEND ──────────────────────────────────────────────────────
            echo "==> Building Vendure server..."
            # NODE_ENV=production ensures vite uses api:{host:'auto'} (not dev localhost)
            NODE_ENV=production npm run build -w server

            echo "==> Restarting Vendure backend..."
            npx pm2 delete vendure-backend 2>/dev/null || true
            npx pm2 start dist/index.js \
              --name vendure-backend \
              --cwd apps/server

            echo "==> Restarting Vendure worker..."
            npx pm2 delete vendure-worker 2>/dev/null || true
            npx pm2 start dist/index-worker.js \
              --name vendure-worker \
              --cwd apps/server

            # Give the backend 8s to bind to port 3002 before the build hits it
            echo "==> Waiting for backend to be ready..."
            sleep 8

            # ── STOREFRONT ───────────────────────────────────────────────────
            echo "==> Building Next.js storefront..."
            # Server-side API URL uses loopback so build fetches bypass Nginx/SSL
            VENDURE_SHOP_API_URL=http://127.0.0.1:3002/shop-api \
              npm run build -w storefront

            echo "==> Restarting storefront in PM2..."
            npx pm2 delete khukuri-storefront 2>/dev/null || true
            # All runtime env vars are set as shell env before PM2 inherits them
            PORT=3001 \
            VENDURE_SHOP_API_URL=http://127.0.0.1:3002/shop-api \
            NEXT_PUBLIC_VENDURE_SHOP_API_URL=https://himalayankhukuri.com/shop-api \
            REVALIDATION_ENDPOINT=http://127.0.0.1:3001 \
            REVALIDATION_SECRET="$REVALIDATION_SECRET" \
              npx pm2 start "npm run start -w storefront" \
                --name khukuri-storefront

            # ── SAVE PM2 STATE ───────────────────────────────────────────────
            echo "==> Saving PM2 process list..."
            npx pm2 save

            # ── BUST ALL CACHES ───────────────────────────────────────────────
            # Wait for Next.js to fully bind before calling revalidate
            echo "==> Waiting for storefront to be ready..."
            sleep 15

            echo "==> Busting all stale caches..."
            curl -s -X POST http://127.0.0.1:3001/api/revalidate \
              -H "Authorization: Bearer $REVALIDATION_SECRET" \
              -H "Content-Type: application/json" \
              -d '{"tags":["featured-products","collections","banners","products"]}' \
              && echo " Cache bust OK" \
              || echo " Cache bust failed (storefront may still be starting)"

            echo ""
            echo "✅ Deployment completed!"
            echo "   Backend   : port 3002 (Vendure)"
            echo "   Storefront: port 3001 (Next.js)"
            echo "   Public    : https://himalayankhukuri.com"
          ENDSSH