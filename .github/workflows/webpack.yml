name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          DEV_PRIVATE_KEY: ${{ secrets.DEV_PRIVATE_KEY }}
          DEV_USER: ${{ secrets.DEV_USER }}
          DEV_HOSTNAME: ${{ secrets.DEV_HOSTNAME }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
        run: |
          eval $(ssh-agent -s)
          echo "$DEV_PRIVATE_KEY" | tr -d '\r' | ssh-add -

          # -l = login shell so .bash_profile / .profile is sourced (loads nvm/node/npm)
          ssh -o StrictHostKeyChecking=no $DEV_USER@$DEV_HOSTNAME \
            REVALIDATION_SECRET="$REVALIDATION_SECRET" \
            bash -l -s << 'ENDSSH'
            set -e   # abort on any error
            # ── Bootstrap nvm + Node 20 LTS ───────────────────────────────────
            export NVM_DIR="$HOME/.nvm"
            # Install nvm if not present (first-time server setup)
            if [ ! -s "$NVM_DIR/nvm.sh" ]; then
              echo "==> nvm not found — installing nvm v0.40.3..."
              curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            fi

            source "$NVM_DIR/nvm.sh"

            # Install and activate Node 20 LTS
            nvm install 20
            nvm use 20
            nvm alias default 20

            echo "==> Node: $(node -v)  npm: $(npm -v)"

            APP_DIR="htdocs/himalayankhukuri.com/khukuri-ecommerce"
            cd "$APP_DIR"

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Normalizing patch file line endings (CRLF→LF for patch-package)..."
            find patches -name "*.patch" -exec sed -i 's/\r//' {} \;

            echo "==> Installing dependencies (Node $(node -v))..."
            npm install

            # ── BACKEND ──────────────────────────────────────────────────────
            echo "==> Building Vendure server..."
            # NODE_ENV=production ensures vite uses api:{host:'auto'} (not dev localhost)
            NODE_ENV=production npm run build -w server

            echo "==> Restarting Vendure backend..."
            npx pm2 delete vendure-backend 2>/dev/null || true
            npx pm2 start dist/index.js \
              --name vendure-backend \
              --cwd apps/server

            echo "==> Restarting Vendure worker..."
            npx pm2 delete vendure-worker 2>/dev/null || true
            npx pm2 start dist/index-worker.js \
              --name vendure-worker \
              --cwd apps/server

            # Wait for Vendure backend to be fully ready (port 3002)
            # ── health-check loop: poll /health every 2s for up to 60s ──────────
            echo "==> Waiting for Vendure backend on :3002 to be healthy..."
            HEALTH_URL="http://127.0.0.1:3002/health"
            MAX_WAIT=60
            WAITED=0
            until curl -sf "$HEALTH_URL" > /dev/null 2>&1; do
              if [ "$WAITED" -ge "$MAX_WAIT" ]; then
                echo "ERROR: Vendure backend did not become healthy after ${MAX_WAIT}s"
                echo "       Last PM2 logs:"
                npx pm2 logs vendure-backend --lines 30 --nostream 2>/dev/null || true
                exit 1
              fi
              printf "  ... still waiting (%ds elapsed)\n" "$WAITED"
              sleep 2
              WAITED=$((WAITED + 2))
            done
            echo "==> Vendure backend is healthy after ${WAITED}s ✓"

            # ── STOREFRONT ───────────────────────────────────────────────────
            echo "==> Building Next.js storefront..."
            # Server-side API URL uses loopback so build fetches bypass Nginx/SSL
            VENDURE_SHOP_API_URL=http://127.0.0.1:3002/shop-api \
              npm run build -w storefront

            echo "==> Restarting storefront in PM2..."
            npx pm2 delete khukuri-storefront 2>/dev/null || true
            # All runtime env vars are set as shell env before PM2 inherits them
            PORT=3001 \
            VENDURE_SHOP_API_URL=http://127.0.0.1:3002/shop-api \
            NEXT_PUBLIC_VENDURE_SHOP_API_URL=https://himalayankhukuri.com/shop-api \
            REVALIDATION_ENDPOINT=http://127.0.0.1:3001 \
            REVALIDATION_SECRET="$REVALIDATION_SECRET" \
              npx pm2 start "npm run start -w storefront" \
                --name khukuri-storefront

            # ── SAVE PM2 STATE ───────────────────────────────────────────────
            echo "==> Saving PM2 process list..."
            npx pm2 save

            # ── BUST ALL CACHES ───────────────────────────────────────────────
            # Wait for Next.js to fully bind before calling revalidate
            echo "==> Waiting for storefront to be ready..."
            sleep 15

            echo "==> Busting all stale caches..."
            curl -s -X POST http://127.0.0.1:3001/api/revalidate \
              -H "Authorization: Bearer $REVALIDATION_SECRET" \
              -H "Content-Type: application/json" \
              -d '{"tags":["featured-products","collections","banners","products"]}' \
              && echo " Cache bust OK" \
              || echo " Cache bust failed (storefront may still be starting)"

            # ── NGINX: ensure /api/settings routes to Vendure backend ────────
            # The storefront catch-all in Nginx intercepts /api/* → port 3001.
            # We need /api/settings (exact match) → port 3002 (Vendure backend).
            # This idempotent snippet adds the location if not already present.
            echo "==> Patching Nginx: route /api/settings to Vendure backend..."
            NGINX_CONF=$(sudo nginx -T 2>/dev/null | grep -m1 'configuration file' | awk '{print $NF}' || true)
            SITE_CONF=$(sudo find /etc/nginx/sites-enabled /etc/nginx/conf.d -name "*.conf" 2>/dev/null | head -1 || echo "")
            TARGET_CONF="${SITE_CONF:-$NGINX_CONF}"

            if [ -n "$TARGET_CONF" ] && ! sudo grep -q '/api/settings' "$TARGET_CONF" 2>/dev/null; then
              echo "==> Adding /api/settings exact-match location to $TARGET_CONF"
              # Insert exact-match block for /api/settings right before the first 'location /' block
              sudo sed -i '/location \/ /i\    # Route custom Vendure REST endpoints to backend\n    location = /api/settings {\n        proxy_pass http:\/\/127.0.0.1:3002;\n        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n    }\n' "$TARGET_CONF" \
                && sudo nginx -t \
                && sudo nginx -s reload \
                && echo " Nginx patched and reloaded" \
                || echo " Nginx patch skipped or failed (manual check needed)"
            else
              echo "==> /api/settings already present in Nginx config — skipping"
            fi
            
            echo ""
            echo "✅ Deployment completed!"
            echo "   Backend   : port 3002 (Vendure)"
            echo "   Storefront: port 3001 (Next.js)"
            echo "   Public    : https://himalayankhukuri.com"
          ENDSSH